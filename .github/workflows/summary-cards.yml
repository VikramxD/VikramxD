name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-summary-cards
    steps:
      - uses: actions/checkout@v4

      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # Prefer a PAT with `read:user` if set; otherwise use the default token.
          GITHUB_TOKEN: ${{ secrets.SUMMARY_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          USERNAME: VikramxD
          BRANCH_NAME: main
          UTC_OFFSET: "5.5"
          THEME: tokyonight
          AUTO_PUSH: true

      - name: Refresh streak stats SVG
        run: |
          git pull --rebase --autostash
          mkdir -p profile-streak
          curl -fsSL "https://streak-stats.demolab.com/?user=VikramxD&theme=tokyonight&hide_border=true" \
            -o profile-streak/github-streak.svg
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add profile-streak/github-streak.svg
          git diff --staged --quiet || git commit -m "Update streak stats SVG"
          git push

